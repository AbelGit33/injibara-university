[build]
  publish = "."
  command = "echo 'Static site'"

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
